<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ton Indicações</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F6F7; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    textarea, input, select { font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 99px; }
    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;
const RC = window.Recharts || {};
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = RC;

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const C = {
  verde:"#00A868", verdeEscuro:"#007A4C", verdeFundo:"#E6F7F1",
  cinza:"#F5F6F7", texto:"#1A1A2E", suave:"#6B7280",
  branco:"#FFFFFF", vermelho:"#EF4444", amarelo:"#F59E0B", azul:"#3B82F6"
};
const COMISSAO = { Smart: 240, T3: 200 };
const BONUS_POR_GRUPO = 100;
const BONUS_CADA = 3;

// ─── FRASES MOTIVACIONAIS ──────────────────────────────────────────────────
const FRASES = [
  { frase:"Vendas não são sobre produtos, são sobre pessoas.", autor:"Zig Ziglar", tecnica:"Rapport: conecte-se primeiro ao cliente antes de falar do produto. Pergunte sobre o negócio dele." },
  { frase:"A diferença entre o possível e o impossível está na determinação.", autor:"Tommy Lasorda", tecnica:"Técnica SPIN: pergunte Situação, Problema, Implicação e Necessidade antes de oferecer solução." },
  { frase:"Cada 'não' te aproxima de um 'sim'.", autor:"Brian Tracy", tecnica:"Regra dos 3 contatos: a maioria das vendas acontece na 3ª ou 4ª abordagem. Não desista no 1º não." },
  { frase:"Sucesso é a soma de pequenos esforços repetidos dia após dia.", autor:"Robert Collier", tecnica:"Gatilho da prova social: mostre quantos comerciantes do bairro já usam a Ton." },
  { frase:"Não encontre clientes para seus produtos, encontre produtos para seus clientes.", autor:"Seth Godin", tecnica:"Técnica do espelho: adapte sua linguagem e ritmo ao do cliente para gerar confiança." },
  { frase:"Entusiasmo é a faísca que transforma conhecimento em ação.", autor:"Dale Carnegie", tecnica:"Urgência real: informe promoções com prazo. 'Essa condição é só essa semana.'" },
  { frase:"O segredo do sucesso em vendas é fazer perguntas, não afirmações.", autor:"Neil Rackham", tecnica:"Técnica AIDA: Atenção → Interesse → Desejo → Ação. Guie o cliente por cada etapa." },
  { frase:"Trate cada cliente como se fosse o único.", autor:"Joe Girard", tecnica:"Ancoragem: apresente primeiro o modelo superior (Smart) para que o T3 pareça mais acessível." },
  { frase:"A persistência realiza o impossível.", autor:"Napoleon Hill", tecnica:"Follow-up: ligue 24h depois de uma visita. 80% dos vendedores não fazem isso e perdem a venda." },
  { frase:"Venda com o coração, não só com a cabeça.", autor:"Howard Schultz", tecnica:"Storytelling: conte como outro comerciante do mesmo segmento cresceu com a maquininha Ton." },
];

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const fmtR = v => v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const fmtD = iso => new Date(iso).toLocaleDateString("pt-BR",{day:"2-digit",month:"short"});
const fmtDH = iso => new Date(iso).toLocaleDateString("pt-BR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
const mesAno = (d=new Date()) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
const nomeMes = (d=new Date()) => d.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});

function getDiasUteisMes(ano, mes) {
  const dias = [];
  const d = new Date(ano, mes, 1);
  while (d.getMonth() === mes) {
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) dias.push(new Date(d));
    d.setDate(d.getDate()+1);
  }
  return dias;
}

function getDiasUteisRestantes() {
  const hoje = new Date();
  const fimMes = new Date(hoje.getFullYear(), hoje.getMonth()+1, 0);
  let dias = 0;
  const d = new Date(hoje);
  d.setDate(d.getDate()+1);
  while (d <= fimMes) {
    if (d.getDay()!==0 && d.getDay()!==6) dias++;
    d.setDate(d.getDate()+1);
  }
  return dias;
}

function getDiasComSabadoRestantes() {
  const hoje = new Date();
  const fimMes = new Date(hoje.getFullYear(), hoje.getMonth()+1, 0);
  let dias = 0;
  const d = new Date(hoje);
  d.setDate(d.getDate()+1);
  while (d <= fimMes) {
    if (d.getDay()!==0) dias++;
    d.setDate(d.getDate()+1);
  }
  return dias;
}

function getDiaAtual() { return new Date().getDate(); }
function getDiasNoMes() { const d=new Date(); return new Date(d.getFullYear(),d.getMonth()+1,0).getDate(); }

function load(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
  catch { return def; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

// ─── COMPONENTS ───────────────────────────────────────────────────────────────
function Card({ titulo, valor, sub, cor, destaque, small }) {
  return (
    <div style={{ background: destaque?cor:C.branco, borderRadius:12, padding:small?10:14, border: destaque?"none":"1.5px solid #F0F0F0" }}>
      <div style={{ fontSize:10, color: destaque?"rgba(255,255,255,0.8)":C.suave, marginBottom:3 }}>{titulo}</div>
      <div style={{ fontSize: small?16:20, fontWeight:800, color: destaque?C.branco:cor, lineHeight:1 }}>{valor}</div>
      {sub && <div style={{ fontSize:10, color: destaque?"rgba(255,255,255,0.7)":"#9CA3AF", marginTop:3 }}>{sub}</div>}
    </div>
  );
}

function Linha({ label, valor, cor, negrito }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
      <span style={{ fontSize:13, color:C.suave }}>{label}</span>
      <span style={{ fontSize:13, fontWeight:negrito?700:500, color:cor||C.texto }}>{valor}</span>
    </div>
  );
}

function Btn({ children, onClick, disabled, cor, outline, small }) {
  const bg = disabled?"#D1D5DB" : outline?"transparent" : (cor||C.verde);
  const txtC = outline?(cor||C.verde):C.branco;
  const brd = outline?`1.5px solid ${cor||C.verde}`:"none";
  return (
    <button onClick={onClick} disabled={disabled} style={{ padding: small?"8px 14px":"12px 18px", background:bg, color:txtC, border:brd, borderRadius:8, fontSize: small?12:14, fontWeight:600, cursor:disabled?"not-allowed":"pointer", transition:"all 0.2s" }}>
      {children}
    </button>
  );
}

// ─── MODAL META DO MÊS ────────────────────────────────────────────────────────
function ModalMeta({ mes, onSalvar }) {
  const [smart, setSmart] = useState("");
  const [t3, setT3] = useState("");
  const metaVal = (parseInt(smart)||0)*COMISSAO.Smart + (parseInt(t3)||0)*COMISSAO.T3 +
    Math.floor(((parseInt(smart)||0)+(parseInt(t3)||0))/BONUS_CADA)*BONUS_POR_GRUPO;
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", padding:20, zIndex:200 }}>
      <div style={{ background:C.branco, borderRadius:16, padding:24, width:"100%", maxWidth:340 }}>
        <div style={{ fontSize:18, fontWeight:800, color:C.texto, marginBottom:4 }}>🎯 Meta de {nomeMes()}</div>
        <div style={{ fontSize:12, color:C.suave, marginBottom:20 }}>Defina quantas máquinas você quer vender este mês.</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
          <div>
            <label style={{ fontSize:12, fontWeight:600, color:C.texto, display:"block", marginBottom:6 }}>Smart (R$ 240/un)</label>
            <input value={smart} onChange={e=>setSmart(e.target.value.replace(/\D/g,""))} placeholder="0" type="number" min="0"
              style={{ width:"100%", padding:"10px 12px", borderRadius:8, border:`1.5px solid ${C.verde}`, fontSize:16, fontWeight:700, textAlign:"center", outline:"none" }} />
          </div>
          <div>
            <label style={{ fontSize:12, fontWeight:600, color:C.texto, display:"block", marginBottom:6 }}>T3 (R$ 200/un)</label>
            <input value={t3} onChange={e=>setT3(e.target.value.replace(/\D/g,""))} placeholder="0" type="number" min="0"
              style={{ width:"100%", padding:"10px 12px", borderRadius:8, border:`1.5px solid ${C.azul}`, fontSize:16, fontWeight:700, textAlign:"center", outline:"none" }} />
          </div>
        </div>
        {(smart||t3) && (
          <div style={{ background:C.verdeFundo, borderRadius:8, padding:12, marginBottom:16, textAlign:"center" }}>
            <div style={{ fontSize:11, color:C.verdeEscuro }}>Meta estimada (comissões + bônus)</div>
            <div style={{ fontSize:24, fontWeight:800, color:C.verde }}>{fmtR(metaVal)}</div>
            <div style={{ fontSize:10, color:C.suave }}>bônus: {fmtR(Math.floor(((parseInt(smart)||0)+(parseInt(t3)||0))/BONUS_CADA)*BONUS_POR_GRUPO)}</div>
          </div>
        )}
        <button onClick={()=>onSalvar({smart:parseInt(smart)||0,t3:parseInt(t3)||0,valor:metaVal})}
          disabled={!(smart||t3)}
          style={{ width:"100%", padding:14, background:(smart||t3)?C.verde:"#D1D5DB", color:C.branco, border:"none", borderRadius:10, fontSize:15, fontWeight:700, cursor:(smart||t3)?"pointer":"not-allowed" }}>
          Confirmar Meta
        </button>
      </div>
    </div>
  );
}

// ─── APP PRINCIPAL ─────────────────────────────────────────────────────────────
function App() {
  const hoje = new Date();
  const chMesAtual = mesAno();

  // STATE
  const [registros, setRegistros] = useState(() => load("ton_registros", []));
  const [metas, setMetas] = useState(() => load("ton_metas", {}));
  const [aba, setAba] = useState("dashboard");
  const [subAba, setSubAba] = useState("cliente"); // registrar
  const [confirmarDel, setConfirmarDel] = useState(null);
  const [showModalMeta, setShowModalMeta] = useState(false);
  const [mesCalendario, setMesCalendario] = useState({ ano: hoje.getFullYear(), mes: hoje.getMonth() });

  // form cliente
  const [fNome, setFNome] = useState("");
  const [fBairro, setFBairro] = useState("");
  const [fTipo, setFTipo] = useState("Smart");
  // form bonus extra
  const [fBonusTipo, setFBonusTipo] = useState("");
  const [fBonusVal, setFBonusVal] = useState("");

  useEffect(()=>{ save("ton_registros", registros); }, [registros]);
  useEffect(()=>{ save("ton_metas", metas); }, [metas]);

  // Verificar se precisa definir meta do mês
  useEffect(()=>{
    if (!metas[chMesAtual]) setShowModalMeta(true);
  }, []);

  // ─── CÁLCULOS ────────────────────────────────────────────────────────────────
  const regMes = registros.filter(r => r.mes === chMesAtual);
  const clientes = regMes.filter(r => r.tipo === "cliente");
  const bonusExtras = regMes.filter(r => r.tipo === "bonus_extra");
  const totalClientes = clientes.length;
  const totalBonusAuto = Math.floor(totalClientes / BONUS_CADA) * BONUS_POR_GRUPO;
  const totalComissoes = clientes.reduce((s,r) => s + (COMISSAO[r.equipamento]||0), 0);
  const totalBonusExtra = bonusExtras.reduce((s,r) => s + (r.valor||0), 0);
  const saldoMes = totalComissoes + totalBonusAuto + totalBonusExtra;

  const metaMes = metas[chMesAtual] || { smart:0, t3:0, valor:0 };
  const metaValor = metaMes.valor || 0;
  const falta = Math.max(0, metaValor - saldoMes);
  const progresso = metaValor > 0 ? Math.min(100, (saldoMes/metaValor)*100) : 0;
  const bateuMeta = saldoMes >= metaValor && metaValor > 0;

  const smartVendidas = clientes.filter(r=>r.equipamento==="Smart").length;
  const t3Vendidas = clientes.filter(r=>r.equipamento==="T3").length;
  const proxBonus = BONUS_CADA - (totalClientes % BONUS_CADA);

  const diasRestantes = getDiasUteisRestantes();
  const diasComSab = getDiasComSabadoRestantes();

  // Indicações necessárias para bater meta
  const mediaComPorVenda = totalClientes>0 ? totalComissoes/totalClientes : 220;
  const vendaParaMeta = falta > 0 ? Math.ceil(falta / (mediaComPorVenda + BONUS_POR_GRUPO/BONUS_CADA)) : 0;
  const metaDiaria = diasRestantes > 0 ? (vendaParaMeta/diasRestantes).toFixed(1) : 0;
  const metaDiariaComSab = diasComSab > 0 ? (vendaParaMeta/diasComSab).toFixed(1) : 0;

  // Frase do dia
  const fraseIdx = hoje.getDate() % FRASES.length;
  const fraseHoje = FRASES[fraseIdx];

  // ─── DADOS PARA GRÁFICO ────────────────────────────────────────────────────
  const dadosGrafico = useMemo(() => {
    const diasUteis = getDiasUteisMes(hoje.getFullYear(), hoje.getMonth());
    const metaAcum = metaValor / (diasUteis.length || 1);
    return diasUteis.map((d, i) => {
      const dStr = d.toISOString().split("T")[0];
      const vendDia = clientes.filter(r => r.data.startsWith(dStr));
      const comDia = vendDia.reduce((s,r)=>(s+COMISSAO[r.equipamento]||0),0);
      const bonusDia = Math.floor(
        clientes.filter(r=>r.data <= d.toISOString()).length / BONUS_CADA
      ) * BONUS_POR_GRUPO - Math.floor(
        clientes.filter(r=>r.data < d.toISOString().replace("T00","T23")).filter((_,ii)=>ii<clientes.filter(r=>r.data<d.toISOString()).length).length / BONUS_CADA
      ) * BONUS_POR_GRUPO;
      const acumReal = clientes.filter(r=> new Date(r.data) <= new Date(dStr+"T23:59:59"))
        .reduce((s,r)=>(s+(COMISSAO[r.equipamento]||0)),0) +
        Math.floor(clientes.filter(r=> new Date(r.data) <= new Date(dStr+"T23:59:59")).length/BONUS_CADA)*BONUS_POR_GRUPO +
        bonusExtras.filter(r=> new Date(r.data) <= new Date(dStr+"T23:59:59")).reduce((s,r)=>s+(r.valor||0),0);
      const acumMeta = metaAcum * (i+1);
      const isFuture = d > hoje;
      return { dia: d.getDate(), real: isFuture ? null : acumReal, meta: acumMeta };
    });
  }, [registros, metas, chMesAtual]);

  // ─── ACTIONS ──────────────────────────────────────────────────────────────
  function registrarCliente() {
    if (!fNome.trim() || !fBairro.trim()) return;
    const novo = {
      id: Date.now(), tipo:"cliente",
      nome: fNome.trim(), bairro: fBairro.trim(), equipamento: fTipo,
      comissao: COMISSAO[fTipo],
      data: new Date().toISOString(), mes: chMesAtual,
    };
    setRegistros(prev => [novo, ...prev]);
    setFNome(""); setFBairro(""); setFTipo("Smart");
    setAba("dashboard");
  }

  function registrarBonusExtra() {
    const val = parseFloat(fBonusVal.replace(",","."));
    if (!fBonusTipo.trim() || !val || val <= 0) return;
    const novo = {
      id: Date.now(), tipo:"bonus_extra",
      bonusTipo: fBonusTipo.trim(), valor: val,
      data: new Date().toISOString(), mes: chMesAtual,
    };
    setRegistros(prev => [novo, ...prev]);
    setFBonusTipo(""); setFBonusVal("");
    setAba("dashboard");
  }

  function deletar(id) {
    setRegistros(prev => prev.filter(r => r.id !== id));
    setConfirmarDel(null);
  }

  function salvarMeta(m) {
    setMetas(prev => ({ ...prev, [chMesAtual]: m }));
    setShowModalMeta(false);
  }

  function exportarDados() {
    const dados = { registros, metas, exportadoEm: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(dados, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `ton-indicacoes-backup-${new Date().toISOString().split("T")[0]}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  const fileInputRef = useRef(null);
  function importarDados(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const dados = JSON.parse(ev.target.result);
        if (!dados.registros || !dados.metas) throw new Error("formato inválido");
        if (window.confirm(`Importar backup de ${dados.exportadoEm ? new Date(dados.exportadoEm).toLocaleString("pt-BR") : "?"}? Isso vai SUBSTITUIR os dados atuais.`)) {
          setRegistros(dados.registros);
          setMetas(dados.metas);
          alert("Dados importados com sucesso!");
        }
      } catch (err) {
        alert("Arquivo inválido. Selecione um backup gerado pelo próprio app.");
      }
      e.target.value = "";
    };
    reader.readAsText(file);
  }

  // ─── CALENDÁRIO ────────────────────────────────────────────────────────────
  function renderCalendario() {
    const { ano, mes } = mesCalendario;
    const primeiro = new Date(ano, mes, 1);
    const ultimo = new Date(ano, mes+1, 0);
    const inicioSem = primeiro.getDay();
    const cells = [];
    for (let i=0; i<inicioSem; i++) cells.push(null);
    for (let d=1; d<=ultimo.getDate(); d++) cells.push(d);
    const nomeMesC = new Date(ano,mes,1).toLocaleDateString("pt-BR",{month:"long",year:"numeric"});

    return (
      <div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
          <button onClick={()=>setMesCalendario(p=>{ const d=new Date(p.ano,p.mes-1,1); return{ano:d.getFullYear(),mes:d.getMonth()}; })}
            style={{ background:"none", border:"none", fontSize:18, cursor:"pointer", color:C.verde }}>‹</button>
          <div style={{ fontSize:14, fontWeight:700, color:C.texto, textTransform:"capitalize" }}>{nomeMesC}</div>
          <button onClick={()=>setMesCalendario(p=>{ const d=new Date(p.ano,p.mes+1,1); return{ano:d.getFullYear(),mes:d.getMonth()}; })}
            style={{ background:"none", border:"none", fontSize:18, cursor:"pointer", color:C.verde }}>›</button>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2, marginBottom:4 }}>
          {["D","S","T","Q","Q","S","S"].map((d,i)=>(
            <div key={i} style={{ textAlign:"center", fontSize:10, fontWeight:700, color:C.suave, padding:"4px 0" }}>{d}</div>
          ))}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
          {cells.map((d,i) => {
            if (!d) return <div key={i} />;
            const dStr = `${ano}-${String(mes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            const vendasDia = clientes.filter(r => r.data.startsWith(dStr));
            const bonusDia = bonusExtras.filter(r => r.data.startsWith(dStr));
            const totalDia = vendasDia.reduce((s,r)=>s+(COMISSAO[r.equipamento]||0),0) + bonusDia.reduce((s,r)=>s+(r.valor||0),0);
            const isHoje = ano===hoje.getFullYear() && mes===hoje.getMonth() && d===hoje.getDate();
            const temVenda = vendasDia.length > 0 || bonusDia.length > 0;
            return (
              <div key={i} style={{ borderRadius:8, padding:"6px 2px", textAlign:"center", background: isHoje?C.verde: temVenda?C.verdeFundo:C.branco, border: isHoje?`none`: temVenda?`1px solid ${C.verde}40`:"1px solid #F0F0F0", minHeight:44 }}>
                <div style={{ fontSize:11, fontWeight: isHoje?700:400, color: isHoje?C.branco: temVenda?C.verdeEscuro:C.suave }}>{d}</div>
                {temVenda && <div style={{ fontSize:9, fontWeight:700, color: isHoje?C.branco:C.verde, marginTop:2 }}>{fmtR(totalDia)}</div>}
                {vendasDia.length>0 && <div style={{ fontSize:8, color: isHoje?"rgba(255,255,255,0.8)":C.suave }}>{vendasDia.length} venda{vendasDia.length>1?"s":""}</div>}
              </div>
            );
          })}
        </div>
        {/* Legenda */}
        <div style={{ display:"flex", gap:12, marginTop:10, fontSize:10, color:C.suave, justifyContent:"center" }}>
          <span>🟢 Com vendas</span><span>🔵 Hoje</span>
        </div>
      </div>
    );
  }

  // ─── RELATÓRIO ────────────────────────────────────────────────────────────
  function renderRelatorio() {
    const smartMeta = metaMes.smart || 0;
    const t3Meta = metaMes.t3 || 0;
    const smartFaltam = Math.max(0, smartMeta - smartVendidas);
    const t3Faltam = Math.max(0, t3Meta - t3Vendidas);
    const diaAtual = getDiaAtual();
    const diasMes = getDiasNoMes();
    const percMes = diaAtual / diasMes;
    const metaEsperadaAgora = metaValor * percMes;
    const statusRitmo = saldoMes >= metaEsperadaAgora ? "✅ Acima do ritmo" : "⚠️ Abaixo do ritmo";
    const percAtingido = metaValor > 0 ? (saldoMes/metaValor*100).toFixed(1) : 0;

    return (
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {/* Cabeçalho */}
        <div style={{ background:C.verde, borderRadius:12, padding:16, color:C.branco }}>
          <div style={{ fontSize:11, opacity:0.8, textTransform:"uppercase", letterSpacing:1 }}>Relatório</div>
          <div style={{ fontSize:18, fontWeight:800 }}>{nomeMes()}</div>
          <div style={{ fontSize:12, opacity:0.85, marginTop:4 }}>{statusRitmo} · Dia {diaAtual}/{diasMes}</div>
        </div>

        {/* Resumo financeiro */}
        <div style={{ background:C.branco, borderRadius:12, padding:16 }}>
          <div style={{ fontSize:12, fontWeight:700, color:C.texto, marginBottom:10 }}>💰 Resumo Financeiro</div>
          <Linha label="Comissões de vendas" valor={fmtR(totalComissoes)} cor={C.verde} />
          <Linha label={`Bônus automático (${Math.floor(totalClientes/BONUS_CADA)}×)`} valor={fmtR(totalBonusAuto)} cor={C.verde} />
          <Linha label="Bônus extras" valor={fmtR(totalBonusExtra)} cor={C.azul} />
          <div style={{ borderTop:`1px solid ${C.cinza}`, marginTop:6, paddingTop:6 }}>
            <Linha label="Total realizado" valor={fmtR(saldoMes)} cor={C.verde} negrito />
            <Linha label="Meta do mês" valor={fmtR(metaValor)} />
            <Linha label="Falta para meta" valor={fmtR(falta)} cor={falta>0?C.vermelho:C.verde} negrito />
          </div>
        </div>

        {/* Atingimento */}
        <div style={{ background:C.branco, borderRadius:12, padding:16 }}>
          <div style={{ fontSize:12, fontWeight:700, color:C.texto, marginBottom:10 }}>📊 Atingimento</div>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
            <span style={{ fontSize:13, color:C.suave }}>Percentual atingido</span>
            <span style={{ fontSize:20, fontWeight:800, color: bateuMeta?C.verde:C.amarelo }}>{percAtingido}%</span>
          </div>
          <div style={{ background:"#F0F0F0", borderRadius:99, height:10, marginBottom:12 }}>
            <div style={{ width:`${progresso}%`, height:"100%", background: bateuMeta?C.verde:C.amarelo, borderRadius:99, transition:"width 0.5s" }} />
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            <div style={{ background:C.verdeFundo, borderRadius:8, padding:10, textAlign:"center" }}>
              <div style={{ fontSize:10, color:C.verdeEscuro }}>Smart vendidas</div>
              <div style={{ fontSize:18, fontWeight:800, color:C.verde }}>{smartVendidas}/{smartMeta}</div>
            </div>
            <div style={{ background:"#EFF6FF", borderRadius:8, padding:10, textAlign:"center" }}>
              <div style={{ fontSize:10, color:C.azul }}>T3 vendidas</div>
              <div style={{ fontSize:18, fontWeight:800, color:C.azul }}>{t3Vendidas}/{t3Meta}</div>
            </div>
          </div>
        </div>

        {/* Pendências */}
        {(smartFaltam > 0 || t3Faltam > 0) && (
          <div style={{ background:C.branco, borderRadius:12, padding:16 }}>
            <div style={{ fontSize:12, fontWeight:700, color:C.texto, marginBottom:10 }}>📋 Oportunidades em Aberto</div>
            {smartFaltam > 0 && (
              <div style={{ marginBottom:10 }}>
                <div style={{ fontSize:11, color:C.suave, marginBottom:6 }}>Smart — {smartFaltam} venda{smartFaltam>1?"s":""} faltando</div>
                {Array.from({length:smartFaltam}).map((_,i)=>(
                  <div key={i} style={{ border:`1.5px dashed ${C.verde}60`, borderRadius:8, padding:"10px 12px", marginBottom:6, display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontSize:12, color:`${C.verde}80`, fontWeight:700 }}>#{smartVendidas+i+1}</span>
                    <span style={{ fontSize:12, color:`${C.suave}`, fontStyle:"italic" }}>Smart — aguardando indicação...</span>
                    <span style={{ marginLeft:"auto", fontSize:12, fontWeight:700, color:C.verde }}>{fmtR(COMISSAO.Smart)}</span>
                  </div>
                ))}
              </div>
            )}
            {t3Faltam > 0 && (
              <div>
                <div style={{ fontSize:11, color:C.suave, marginBottom:6 }}>T3 — {t3Faltam} venda{t3Faltam>1?"s":""} faltando</div>
                {Array.from({length:t3Faltam}).map((_,i)=>(
                  <div key={i} style={{ border:`1.5px dashed ${C.azul}60`, borderRadius:8, padding:"10px 12px", marginBottom:6, display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontSize:12, color:`${C.azul}80`, fontWeight:700 }}>#{t3Vendidas+i+1}</span>
                    <span style={{ fontSize:12, color:`${C.suave}`, fontStyle:"italic" }}>T3 — aguardando indicação...</span>
                    <span style={{ marginLeft:"auto", fontSize:12, fontWeight:700, color:C.azul }}>{fmtR(COMISSAO.T3)}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Sugestão de atingimento */}
        {falta > 0 && (
          <div style={{ background:C.branco, borderRadius:12, padding:16 }}>
            <div style={{ fontSize:12, fontWeight:700, color:C.texto, marginBottom:10 }}>🚀 Sugestão de Atingimento</div>
            <div style={{ background:C.verdeFundo, borderRadius:8, padding:12, marginBottom:8 }}>
              <div style={{ fontSize:11, fontWeight:700, color:C.verdeEscuro, marginBottom:4 }}>📅 Apenas dias úteis</div>
              <div style={{ fontSize:12, color:C.suave }}>{diasRestantes} dias restantes → <strong style={{color:C.verde}}>{metaDiaria} vendas/dia</strong></div>
              <div style={{ fontSize:11, color:C.suave, marginTop:2 }}>Faltam {vendaParaMeta} vendas · {fmtR(falta)} para a meta</div>
            </div>
            <div style={{ background:"#FFF7ED", border:"1px solid #FED7AA", borderRadius:8, padding:12 }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#C2410C", marginBottom:4 }}>📅 Incluindo sábados</div>
              <div style={{ fontSize:12, color:C.suave }}>{diasComSab} dias restantes → <strong style={{color:"#EA580C"}}>{metaDiariaComSab} vendas/dia</strong></div>
              <div style={{ fontSize:11, color:C.suave, marginTop:2 }}>Trabalhar aos sábados reduz a pressão diária!</div>
              {diasRestantes > 0 && (
                <div style={{ fontSize:11, color:"#C2410C", marginTop:4, fontWeight:600 }}>
                  💡 Economia: {(parseFloat(metaDiaria)-parseFloat(metaDiariaComSab)).toFixed(1)} vendas/dia a menos com sábados
                </div>
              )}
            </div>
          </div>
        )}

        {/* Vendas realizadas */}
        <div style={{ background:C.branco, borderRadius:12, padding:16 }}>
          <div style={{ fontSize:12, fontWeight:700, color:C.texto, marginBottom:10 }}>📦 Vendas Realizadas ({totalClientes})</div>
          {clientes.length === 0 ? (
            <div style={{ textAlign:"center", color:C.suave, fontSize:13, padding:"12px 0" }}>Nenhuma venda registrada</div>
          ) : clientes.map((r,i) => (
            <div key={r.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:i<clientes.length-1?`1px solid ${C.cinza}`:"none" }}>
              <div>
                <div style={{ fontSize:13, fontWeight:600, color:C.texto }}>{r.nome}</div>
                <div style={{ fontSize:11, color:C.suave }}>{r.bairro} · {r.equipamento} · {fmtD(r.data)}</div>
              </div>
              <div style={{ fontSize:13, fontWeight:700, color:C.verde }}>{fmtR(r.comissao)}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ─── RENDER ───────────────────────────────────────────────────────────────
  const abas = [
    { id:"dashboard", label:"📊", title:"Resumo" },
    { id:"registrar", label:"➕", title:"Registrar" },
    { id:"calendario", label:"📅", title:"Calendário" },
    { id:"metas", label:"🎯", title:"Metas" },
    { id:"relatorio", label:"📋", title:"Relatório" },
  ];

  return (
    <div style={{ fontFamily:"'Inter', system-ui, sans-serif", background:C.cinza, minHeight:"100vh", maxWidth:480, margin:"0 auto", paddingBottom:80 }}>

      {showModalMeta && <ModalMeta mes={chMesAtual} onSalvar={salvarMeta} />}

      {/* Header */}
      <div style={{ background:C.verde, padding:"20px 20px 16px", color:C.branco }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:34, height:34, background:"rgba(255,255,255,0.2)", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>💳</div>
            <div>
              <div style={{ fontSize:10, opacity:0.8, letterSpacing:1, textTransform:"uppercase" }}>Minhas Indicações</div>
              <div style={{ fontSize:17, fontWeight:800 }}>Ton Maquininhas</div>
            </div>
          </div>
          <button onClick={()=>setShowModalMeta(true)}
            style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:8, padding:"6px 10px", color:C.branco, fontSize:11, fontWeight:600, cursor:"pointer" }}>
            Meta ✏️
          </button>
        </div>
      </div>

      {/* Barra progresso */}
      <div style={{ background:C.verdeEscuro, padding:"10px 20px 14px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", color:C.branco, fontSize:11, marginBottom:6, opacity:0.9 }}>
          <span>{fmtR(saldoMes)}</span>
          <span>Meta: {metaValor > 0 ? fmtR(metaValor) : "não definida"}</span>
        </div>
        <div style={{ background:"rgba(255,255,255,0.2)", borderRadius:99, height:7 }}>
          <div style={{ width:`${progresso}%`, height:"100%", background: bateuMeta?"#FFD700":C.branco, borderRadius:99, transition:"width 0.5s" }} />
        </div>
        <div style={{ color:C.branco, fontSize:10, marginTop:5, opacity:0.8, textAlign:"center" }}>
          {bateuMeta ? "🏆 META BATIDA! Parabéns!" : `${progresso.toFixed(1)}% da meta atingida`}
        </div>
      </div>

      {/* Abas */}
      <div style={{ display:"flex", background:C.branco, borderBottom:`2px solid ${C.cinza}` }}>
        {abas.map(({id,label,title})=>(
          <button key={id} onClick={()=>setAba(id)} style={{ flex:1, padding:"10px 2px", border:"none", background:"none", fontSize:16, cursor:"pointer", borderBottom: aba===id?`2px solid ${C.verde}`:"2px solid transparent", marginBottom:-2, opacity: aba===id?1:0.5 }} title={title}>
            {label}
          </button>
        ))}
      </div>

      <div style={{ padding:"14px" }}>

        {/* ── DASHBOARD ────────────────────────────────────────── */}
        {aba === "dashboard" && (
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <Card titulo="Ganhos no Mês" valor={fmtR(saldoMes)} sub="comissões + bônus" cor={C.verde} destaque />
              <Card titulo="Falta para Meta" valor={fmtR(falta)} sub={bateuMeta?"Meta atingida! 🎉":"para bater a meta"} cor={bateuMeta?C.verde:C.vermelho} />
              <Card titulo="Vendas" valor={totalClientes} sub={`Smart ${smartVendidas} · T3 ${t3Vendidas}`} cor={C.texto} />
              <Card titulo="Próximo Bônus" valor={`${proxBonus===BONUS_CADA?0:proxBonus} venda${proxBonus!==1?"s":""}`} sub="+R$ 100 a cada 3" cor={C.amarelo} />
            </div>

            {/* Meta diária + gráfico */}
            {!bateuMeta && metaValor > 0 && (
              <div style={{ background:C.verdeFundo, border:`1px solid ${C.verde}30`, borderRadius:12, padding:16 }}>
                <div style={{ fontSize:12, fontWeight:700, color:C.verdeEscuro, marginBottom:10 }}>🎯 Ritmo Atual</div>
                <div style={{ display:"flex", justifyContent:"space-around", textAlign:"center", marginBottom:14 }}>
                  <div>
                    <div style={{ fontSize:24, fontWeight:800, color:C.verdeEscuro }}>{vendaParaMeta}</div>
                    <div style={{ fontSize:10, color:C.suave }}>vendas faltando</div>
                  </div>
                  <div style={{ width:1, background:`${C.verde}30` }} />
                  <div>
                    <div style={{ fontSize:24, fontWeight:800, color:C.verdeEscuro }}>{diasRestantes}</div>
                    <div style={{ fontSize:10, color:C.suave }}>dias úteis</div>
                  </div>
                  <div style={{ width:1, background:`${C.verde}30` }} />
                  <div>
                    <div style={{ fontSize:24, fontWeight:800, color:C.verdeEscuro }}>{metaDiaria}</div>
                    <div style={{ fontSize:10, color:C.suave }}>vendas/dia</div>
                  </div>
                </div>
                {/* Gráfico de linhas */}
                {dadosGrafico.length > 0 && LineChart && (
                  <div>
                    <div style={{ fontSize:10, color:C.verdeEscuro, fontWeight:600, marginBottom:6 }}>Evolução acumulada do mês</div>
                    <ResponsiveContainer width="100%" height={160}>
                      <LineChart data={dadosGrafico} margin={{top:4,right:4,bottom:0,left:0}}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#C8EAD8" />
                        <XAxis dataKey="dia" tick={{fontSize:9,fill:C.suave}} tickLine={false} axisLine={false} />
                        <YAxis tick={{fontSize:9,fill:C.suave}} tickLine={false} axisLine={false} tickFormatter={v=>fmtR(v).replace("R$","").trim()} width={48} />
                        <Tooltip formatter={(v,n)=>[fmtR(v||0), n==="real"?"Realizado":"Meta"]} labelFormatter={l=>`Dia ${l}`} contentStyle={{fontSize:11,borderRadius:8}} />
                        <Line type="monotone" dataKey="meta" stroke={`${C.verde}60`} strokeDasharray="4 3" strokeWidth={1.5} dot={false} name="meta" />
                        <Line type="monotone" dataKey="real" stroke={C.verde} strokeWidth={2.5} dot={{r:2,fill:C.verde}} connectNulls={false} name="real" />
                      </LineChart>
                    </ResponsiveContainer>
                    <div style={{ display:"flex", gap:12, justifyContent:"center", marginTop:6, fontSize:10, color:C.suave }}>
                      <span style={{ display:"flex", alignItems:"center", gap:4 }}><span style={{ width:16, height:2, background:C.verde, display:"inline-block" }} /> Realizado</span>
                      <span style={{ display:"flex", alignItems:"center", gap:4 }}><span style={{ width:16, height:2, background:`${C.verde}60`, display:"inline-block", borderTop:`1.5px dashed ${C.verde}60` }} /> Meta</span>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Detalhamento */}
            <div style={{ background:C.branco, borderRadius:12, padding:16 }}>
              <div style={{ fontSize:12, fontWeight:700, color:C.texto, marginBottom:10 }}>💰 Detalhamento</div>
              <Linha label={`Comissões (${totalClientes} vendas)`} valor={fmtR(totalComissoes)} cor={C.verde} />
              <Linha label={`Bônus auto (${Math.floor(totalClientes/BONUS_CADA)} grupos)`} valor={fmtR(totalBonusAuto)} cor={C.verde} />
              <Linha label="Bônus extras" valor={fmtR(totalBonusExtra)} cor={C.azul} />
              <div style={{ borderTop:`1px solid ${C.cinza}`, marginTop:6, paddingTop:6 }}>
                <Linha label="Total do mês" valor={fmtR(saldoMes)} negrito cor={C.verde} />
              </div>
            </div>

            {/* Motivação */}
            <div style={{ background:C.branco, borderRadius:12, padding:16, borderLeft:`3px solid ${C.verde}` }}>
              <div style={{ fontSize:10, fontWeight:700, color:C.verde, textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>✨ Motivação do Dia</div>
              <div style={{ fontSize:13, fontStyle:"italic", color:C.texto, lineHeight:1.5, marginBottom:4 }}>"{fraseHoje.frase}"</div>
              <div style={{ fontSize:11, color:C.suave, marginBottom:10 }}>— {fraseHoje.autor}</div>
              <div style={{ background:C.cinza, borderRadius:8, padding:"8px 10px" }}>
                <div style={{ fontSize:10, fontWeight:700, color:C.verdeEscuro, marginBottom:2 }}>💡 Técnica do dia</div>
                <div style={{ fontSize:11, color:C.suave, lineHeight:1.5 }}>{fraseHoje.tecnica}</div>
              </div>
            </div>

            {/* Backup */}
            <div style={{ background:C.branco, borderRadius:12, padding:16 }}>
              <div style={{ fontSize:11, fontWeight:700, color:C.texto, textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>💾 Backup dos Dados</div>
              <div style={{ fontSize:11, color:C.suave, marginBottom:12, lineHeight:1.4 }}>
                Seus dados ficam salvos só neste navegador. Exporte regularmente para não perder nada e para usar em outro dispositivo.
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={exportarDados} style={{ flex:1, padding:"10px 8px", background:C.verde, color:C.branco, border:"none", borderRadius:8, fontSize:12, fontWeight:600, cursor:"pointer" }}>
                  ⬇️ Exportar
                </button>
                <button onClick={()=>fileInputRef.current.click()} style={{ flex:1, padding:"10px 8px", background:"transparent", color:C.verde, border:`1.5px solid ${C.verde}`, borderRadius:8, fontSize:12, fontWeight:600, cursor:"pointer" }}>
                  ⬆️ Importar
                </button>
                <input ref={fileInputRef} type="file" accept="application/json" onChange={importarDados} style={{ display:"none" }} />
              </div>
            </div>

          </div>
        )}

        {/* ── REGISTRAR ────────────────────────────────────────── */}
        {aba === "registrar" && (
          <div>
            <div style={{ display:"flex", background:C.branco, borderRadius:10, padding:4, marginBottom:14, gap:4 }}>
              {[["cliente","👤 Cliente"],["bonus_extra","🎁 Bônus Extra"]].map(([id,label])=>(
                <button key={id} onClick={()=>setSubAba(id)}
                  style={{ flex:1, padding:"9px 4px", border:"none", borderRadius:7, fontSize:12, fontWeight:600, background: subAba===id?C.verde:"transparent", color: subAba===id?C.branco:C.suave, cursor:"pointer", transition:"all 0.2s" }}>
                  {label}
                </button>
              ))}
            </div>

            {subAba === "cliente" && (
              <div style={{ background:C.branco, borderRadius:12, padding:20 }}>
                <div style={{ fontSize:15, fontWeight:700, color:C.texto, marginBottom:4 }}>Registrar Cliente</div>
                <div style={{ fontSize:12, color:C.suave, marginBottom:16 }}>
                  Venda #{totalClientes+1} {(totalClientes+1)%BONUS_CADA===0?"🎉 +Bônus R$ 100!":""}
                </div>

                <label style={{ fontSize:12, fontWeight:600, color:C.texto, display:"block", marginBottom:5 }}>Nome do cliente *</label>
                <input value={fNome} onChange={e=>setFNome(e.target.value)} placeholder="Ex: João Silva"
                  style={{ width:"100%", padding:"11px 13px", borderRadius:8, border:`1.5px solid ${fNome?C.verde:"#E5E7EB"}`, fontSize:14, outline:"none", marginBottom:12 }} />

                <label style={{ fontSize:12, fontWeight:600, color:C.texto, display:"block", marginBottom:5 }}>Bairro *</label>
                <input value={fBairro} onChange={e=>setFBairro(e.target.value)} placeholder="Ex: Centro"
                  style={{ width:"100%", padding:"11px 13px", borderRadius:8, border:`1.5px solid ${fBairro?C.verde:"#E5E7EB"}`, fontSize:14, outline:"none", marginBottom:12 }} />

                <label style={{ fontSize:12, fontWeight:600, color:C.texto, display:"block", marginBottom:8 }}>Equipamento *</label>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>
                  {["Smart","T3"].map(tipo=>(
                    <button key={tipo} onClick={()=>setFTipo(tipo)}
                      style={{ padding:"12px 8px", border:`2px solid ${fTipo===tipo?C.verde:"#E5E7EB"}`, borderRadius:10, background: fTipo===tipo?C.verdeFundo:C.branco, cursor:"pointer", transition:"all 0.2s" }}>
                      <div style={{ fontSize:14, fontWeight:800, color: fTipo===tipo?C.verde:C.suave }}>{tipo}</div>
                      <div style={{ fontSize:11, color: fTipo===tipo?C.verdeEscuro:C.suave }}>{fmtR(COMISSAO[tipo])}</div>
                    </button>
                  ))}
                </div>

                <div style={{ background:C.verdeFundo, borderRadius:8, padding:12, marginBottom:14, textAlign:"center" }}>
                  <div style={{ fontSize:11, color:C.verdeEscuro }}>Você vai receber</div>
                  <div style={{ fontSize:22, fontWeight:800, color:C.verde }}>
                    {fmtR((totalClientes+1)%BONUS_CADA===0 ? COMISSAO[fTipo]+BONUS_POR_GRUPO : COMISSAO[fTipo])}
                  </div>
                  <div style={{ fontSize:10, color:C.suave }}>
                    {fmtR(COMISSAO[fTipo])} comissão{(totalClientes+1)%BONUS_CADA===0?" + "+fmtR(BONUS_POR_GRUPO)+" bônus 🎉":""}
                  </div>
                </div>

                <button onClick={registrarCliente} disabled={!fNome.trim()||!fBairro.trim()}
                  style={{ width:"100%", padding:14, background: (fNome.trim()&&fBairro.trim())?C.verde:"#D1D5DB", color:C.branco, border:"none", borderRadius:10, fontSize:15, fontWeight:700, cursor:(fNome.trim()&&fBairro.trim())?"pointer":"not-allowed" }}>
                  Registrar Venda
                </button>
              </div>
            )}

            {subAba === "bonus_extra" && (
              <div style={{ background:C.branco, borderRadius:12, padding:20 }}>
                <div style={{ fontSize:15, fontWeight:700, color:C.texto, marginBottom:4 }}>Registrar Bônus Extra</div>
                <div style={{ fontSize:12, color:C.suave, marginBottom:16 }}>Incentivos, premiações ou outros valores recebidos.</div>

                <label style={{ fontSize:12, fontWeight:600, color:C.texto, display:"block", marginBottom:5 }}>Tipo do bônus *</label>
                <input value={fBonusTipo} onChange={e=>setFBonusTipo(e.target.value)} placeholder="Ex: Campanha de aceleração, Premiação..."
                  style={{ width:"100%", padding:"11px 13px", borderRadius:8, border:`1.5px solid ${fBonusTipo?C.azul:"#E5E7EB"}`, fontSize:14, outline:"none", marginBottom:12 }} />

                <label style={{ fontSize:12, fontWeight:600, color:C.texto, display:"block", marginBottom:5 }}>Valor (R$) *</label>
                <input value={fBonusVal} onChange={e=>setFBonusVal(e.target.value.replace(/[^0-9,.]/g,""))} placeholder="0,00"
                  style={{ width:"100%", padding:"11px 13px", borderRadius:8, border:`1.5px solid ${fBonusVal?C.azul:"#E5E7EB"}`, fontSize:20, fontWeight:700, outline:"none", marginBottom:16, textAlign:"center" }} />

                {fBonusVal && parseFloat(fBonusVal.replace(",",".")) > 0 && (
                  <div style={{ background:"#EFF6FF", borderRadius:8, padding:12, marginBottom:14, textAlign:"center" }}>
                    <div style={{ fontSize:11, color:C.azul }}>Será acrescido ao saldo</div>
                    <div style={{ fontSize:22, fontWeight:800, color:C.azul }}>{fmtR(parseFloat(fBonusVal.replace(",","."))||0)}</div>
                  </div>
                )}

                <button onClick={registrarBonusExtra} disabled={!fBonusTipo.trim()||!(parseFloat(fBonusVal.replace(",","."))||0)}
                  style={{ width:"100%", padding:14, background:(fBonusTipo.trim()&&fBonusVal)?C.azul:"#D1D5DB", color:C.branco, border:"none", borderRadius:10, fontSize:15, fontWeight:700, cursor:(fBonusTipo.trim()&&fBonusVal)?"pointer":"not-allowed" }}>
                  Registrar Bônus
                </button>
              </div>
            )}

            {/* Histórico rápido */}
            {regMes.length > 0 && (
              <div style={{ marginTop:12 }}>
                <div style={{ fontSize:12, fontWeight:700, color:C.texto, marginBottom:8 }}>Registros do mês</div>
                {regMes.slice(0,10).map((r,i)=>{
                  const temBonus = r.tipo==="cliente" && clientes.findIndex(c=>c.id===r.id)>=0 &&
                    (clientes.findIndex(c=>c.id===r.id)+1)%BONUS_CADA===0;
                  return (
                    <div key={r.id} style={{ background:C.branco, borderRadius:10, padding:12, marginBottom:6, display:"flex", justifyContent:"space-between", alignItems:"center", border: temBonus?`1.5px solid ${C.verde}`:"1.5px solid transparent" }}>
                      <div>
                        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                          <span style={{ fontSize:13, fontWeight:600, color:C.texto }}>{r.tipo==="cliente"?r.nome:r.bonusTipo}</span>
                          {r.tipo==="cliente" && <span style={{ fontSize:10, background: r.equipamento==="Smart"?C.verdeFundo:"#EFF6FF", color: r.equipamento==="Smart"?C.verdeEscuro:C.azul, padding:"1px 6px", borderRadius:99, fontWeight:600 }}>{r.equipamento}</span>}
                          {r.tipo==="bonus_extra" && <span style={{ fontSize:10, background:"#EFF6FF", color:C.azul, padding:"1px 6px", borderRadius:99, fontWeight:600 }}>Extra</span>}
                          {temBonus && <span style={{ fontSize:10, background:C.verde, color:C.branco, padding:"1px 6px", borderRadius:99, fontWeight:700 }}>+BÔNUS</span>}
                        </div>
                        {r.bairro && <div style={{ fontSize:11, color:C.suave }}>{r.bairro}</div>}
                        <div style={{ fontSize:10, color:C.suave }}>{fmtDH(r.data)}</div>
                      </div>
                      <div style={{ textAlign:"right" }}>
                        <div style={{ fontSize:14, fontWeight:700, color: r.tipo==="bonus_extra"?C.azul:C.verde }}>{fmtR(r.tipo==="cliente"?r.comissao:r.valor)}</div>
                        <button onClick={()=>setConfirmarDel(r.id)} style={{ fontSize:10, color:C.suave, background:"none", border:"none", cursor:"pointer" }}>remover</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── CALENDÁRIO ───────────────────────────────────────── */}
        {aba === "calendario" && (
          <div style={{ background:C.branco, borderRadius:12, padding:16 }}>
            {renderCalendario()}
          </div>
        )}

        {/* ── METAS ────────────────────────────────────────────── */}
        {aba === "metas" && (
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <div style={{ background:C.branco, borderRadius:12, padding:16 }}>
              <div style={{ fontSize:14, fontWeight:700, color:C.texto, marginBottom:4 }}>🎯 Meta de {nomeMes()}</div>
              {metaValor > 0 ? (
                <>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12 }}>
                    <div style={{ background:C.verdeFundo, borderRadius:8, padding:12, textAlign:"center" }}>
                      <div style={{ fontSize:10, color:C.verdeEscuro }}>Smart</div>
                      <div style={{ fontSize:22, fontWeight:800, color:C.verde }}>{metaMes.smart}</div>
                      <div style={{ fontSize:10, color:C.suave }}>{fmtR(metaMes.smart*COMISSAO.Smart)}</div>
                    </div>
                    <div style={{ background:"#EFF6FF", borderRadius:8, padding:12, textAlign:"center" }}>
                      <div style={{ fontSize:10, color:C.azul }}>T3</div>
                      <div style={{ fontSize:22, fontWeight:800, color:C.azul }}>{metaMes.t3}</div>
                      <div style={{ fontSize:10, color:C.suave }}>{fmtR(metaMes.t3*COMISSAO.T3)}</div>
                    </div>
                  </div>
                  <div style={{ background:C.cinza, borderRadius:8, padding:12, marginBottom:12 }}>
                    <Linha label="Comissões Smart" valor={fmtR((metaMes.smart||0)*COMISSAO.Smart)} />
                    <Linha label="Comissões T3" valor={fmtR((metaMes.t3||0)*COMISSAO.T3)} />
                    <Linha label="Bônus esperados" valor={fmtR(Math.floor(((metaMes.smart||0)+(metaMes.t3||0))/BONUS_CADA)*BONUS_POR_GRUPO)} cor={C.verde} />
                    <div style={{ borderTop:`1px solid #E5E7EB`, marginTop:6, paddingTop:6 }}>
                      <Linha label="Meta total" valor={fmtR(metaValor)} negrito cor={C.verde} />
                    </div>
                  </div>
                  <button onClick={()=>setShowModalMeta(true)}
                    style={{ width:"100%", padding:12, border:`1.5px solid ${C.verde}`, background:"transparent", color:C.verde, borderRadius:8, fontSize:13, fontWeight:600, cursor:"pointer" }}>
                    Alterar Meta do Mês
                  </button>
                </>
              ) : (
                <div style={{ textAlign:"center", padding:"20px 0" }}>
                  <div style={{ fontSize:32, marginBottom:8 }}>🎯</div>
                  <div style={{ fontSize:14, color:C.suave, marginBottom:12 }}>Nenhuma meta definida para este mês.</div>
                  <button onClick={()=>setShowModalMeta(true)}
                    style={{ padding:"12px 24px", background:C.verde, color:C.branco, border:"none", borderRadius:8, fontSize:14, fontWeight:600, cursor:"pointer" }}>
                    Definir Meta
                  </button>
                </div>
              )}
            </div>

            {/* Histórico de metas */}
            {Object.keys(metas).length > 1 && (
              <div style={{ background:C.branco, borderRadius:12, padding:16 }}>
                <div style={{ fontSize:12, fontWeight:700, color:C.texto, marginBottom:10 }}>Histórico de Metas</div>
                {Object.entries(metas).sort((a,b)=>b[0].localeCompare(a[0])).map(([m,meta])=>{
                  const regM = registros.filter(r=>r.mes===m&&r.tipo==="cliente");
                  const ganhosM = regM.reduce((s,r)=>s+(COMISSAO[r.equipamento]||0),0)+Math.floor(regM.length/BONUS_CADA)*BONUS_POR_GRUPO;
                  const percM = meta.valor>0?(ganhosM/meta.valor*100).toFixed(0):0;
                  const [ano,mes] = m.split("-");
                  const nomeM = new Date(parseInt(ano),parseInt(mes)-1,1).toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
                  return (
                    <div key={m} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${C.cinza}` }}>
                      <div>
                        <div style={{ fontSize:13, fontWeight:600, color:C.texto, textTransform:"capitalize" }}>{nomeM}</div>
                        <div style={{ fontSize:11, color:C.suave }}>{fmtR(ganhosM)} / {fmtR(meta.valor)}</div>
                      </div>
                      <div style={{ fontSize:16, fontWeight:800, color: parseInt(percM)>=100?C.verde:C.amarelo }}>{percM}%</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── RELATÓRIO ────────────────────────────────────────── */}
        {aba === "relatorio" && renderRelatorio()}

      </div>

      {/* Modal confirmar deleção */}
      {confirmarDel && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"center", justifyContent:"center", padding:20, zIndex:100 }}>
          <div style={{ background:C.branco, borderRadius:16, padding:24, width:"100%", maxWidth:320 }}>
            <div style={{ fontSize:16, fontWeight:700, color:C.texto, marginBottom:8 }}>Remover registro?</div>
            <div style={{ fontSize:13, color:C.suave, marginBottom:20 }}>Esta ação não pode ser desfeita.</div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={()=>setConfirmarDel(null)} style={{ flex:1, padding:12, borderRadius:8, border:"1px solid #E5E7EB", background:C.branco, fontSize:14, cursor:"pointer" }}>Cancelar</button>
              <button onClick={()=>deletar(confirmarDel)} style={{ flex:1, padding:12, borderRadius:8, border:"none", background:C.vermelho, color:C.branco, fontSize:14, fontWeight:700, cursor:"pointer" }}>Remover</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
